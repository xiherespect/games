<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>俄罗斯方块</title>
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <div id="app">
    <h1>俄罗斯方块</h1>

    <div class="game-container">
      <!-- 左列：分数信息 -->
      <div class="left-panel">
        <div class="info-box">
          <h2>分数</h2>
          <div class="score" id="score">0</div>
        </div>

        <div class="info-box">
          <h2>最高分</h2>
          <div class="score" id="high-score">0</div>
        </div>
      </div>

      <!-- 中列：游戏棋盘 -->
      <div class="game-board">
        <canvas id="game-canvas"></canvas>
        <div id="pause-overlay" class="overlay hidden">
          <h2>游戏暂停</h2>
          <p>按 P 键继续</p>
        </div>
        <div id="game-over-overlay" class="overlay hidden">
          <h2>游戏结束</h2>
          <p>最终分数：<span id="final-score">0</span></p>
          <button id="restart-button" class="restart-button">再玩一次</button>
        </div>

        <!-- 触摸控制按钮 -->
        <div class="touch-controls">
          <div class="touch-row">
            <button class="touch-btn touch-btn-large" id="touch-rotate">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 4 L4 8 L8 20 L16 12" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="touch-row">
            <button class="touch-btn" id="touch-left">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 12 L6 12" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="touch-btn" id="touch-down">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 16 L12 16 L18 8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="touch-btn" id="touch-right">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 12 L18 12" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="touch-btn touch-btn-drop" id="touch-hard-drop">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 6 L18 6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 2 L12 22" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6 18 L18 18" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="touch-row">
            <button class="touch-btn" id="touch-pause">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="6" y="6" width="12" height="12" rx="1" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 右列：控制面板 -->
      <div class="right-panel">
        <div class="info-box">
          <h2>下一个</h2>
          <canvas id="next-piece-canvas" width="120" height="120"></canvas>
        </div>

        <div class="info-box">
          <h2>难度</h2>
          <select id="difficulty">
            <option value="easy">简单</option>
            <option value="medium" selected>中等</option>
            <option value="hard">困难</option>
          </select>
        </div>

        <button id="start-button" class="start-button">开始游戏</button>

        <div class="controls">
          <h2>操作说明</h2>
          <table>
            <tr><td>← / A</td><td>向左移动</td></tr>
            <tr><td>→ / D</td><td>向右移动</td></tr>
            <tr><td>↓ / S</td><td>加速下落</td></tr>
            <tr><td>↑ / W</td><td>旋转方块</td></tr>
            <tr><td>空格</td><td>直接落底</td></tr>
            <tr><td>P</td><td>暂停/继续</td></tr>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
